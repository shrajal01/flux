<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flux - Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&amp;family=Geist:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .glass-panel {
            background: rgba(22, 22, 24, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-glow:focus-within {
            box-shadow: 0 0 20px rgba(208, 188, 255, 0.15);
            border-color: #d0bcff;
        }

        .bg-aurora {
            background: radial-gradient(circle at 50% 50%, rgba(208, 188, 255, 0.08) 0%, rgba(10, 10, 11, 0) 60%);
        }

        .custom-button-gradient {
            background: linear-gradient(135deg, #a078ff 0%, #6d3bd7 100%);
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        .animate-pulse-slow {
            animation: pulse-slow 8s infinite ease-in-out;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface": "#131314",
                      "primary-fixed-dim": "#d0bcff",
                      "error-container": "#93000a",
                      "on-secondary-fixed": "#001f26",
                      "secondary-fixed-dim": "#4cd7f6",
                      "outline": "#958ea0",
                      "on-tertiary-container": "#003111",
                      "secondary-container": "#03b5d3",
                      "primary-container": "#a078ff",
                      "surface-container": "#201f20",
                      "inverse-on-surface": "#313031",
                      "tertiary-container": "#00a74b",
                      "on-primary-fixed-variant": "#5516be",
                      "tertiary-fixed-dim": "#4ae176",
                      "surface-container-highest": "#353436",
                      "on-primary-container": "#340080",
                      "surface-bright": "#3a393a",
                      "outline-variant": "#494454",
                      "error": "#ffb4ab",
                      "on-background": "#e5e2e3",
                      "on-surface": "#e5e2e3",
                      "on-secondary-fixed-variant": "#004e5c",
                      "primary-fixed": "#e9ddff",
                      "inverse-surface": "#e5e2e3",
                      "on-primary-fixed": "#23005c",
                      "on-primary": "#3c0091",
                      "inverse-primary": "#6d3bd7",
                      "on-secondary": "#003640",
                      "secondary-fixed": "#acedff",
                      "on-tertiary-fixed-variant": "#005321",
                      "primary": "#d0bcff",
                      "background": "#131314",
                      "tertiary-fixed": "#6bff8f",
                      "tertiary": "#4ae176",
                      "on-tertiary-fixed": "#002109",
                      "on-tertiary": "#003915",
                      "surface-container-lowest": "#0e0e0f",
                      "surface-tint": "#d0bcff",
                      "on-error": "#690005",
                      "secondary": "#4cd7f6",
                      "on-surface-variant": "#cbc3d7",
                      "surface-container-low": "#1c1b1c",
                      "surface-variant": "#353436",
                      "on-error-container": "#ffdad6",
                      "on-secondary-container": "#00424e",
                      "surface-dim": "#131314",
                      "surface-container-high": "#2a2a2b"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin-safe": "32px",
                      "xs": "4px",
                      "unit": "4px",
                      "sm": "8px",
                      "lg": "24px",
                      "xl": "40px",
                      "md": "16px",
                      "gutter": "20px"
              },
              "fontFamily": {
                      "headline-md": ["Inter"],
                      "mono-sm": ["Geist"],
                      "label-md": ["Geist"],
                      "body-lg": ["Inter"],
                      "display-lg": ["Inter"],
                      "body-md": ["Inter"],
                      "headline-sm": ["Inter"]
              },
              "fontSize": {
                      "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.02em", "fontWeight": "500"}],
                      "mono-sm": ["13px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                      "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "body-lg": ["16px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                      "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "600"}],
                      "body-md": ["14px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                      "headline-sm": ["18px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "500"}]
              }
            },
          },
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center overflow-hidden selection:bg-primary/30">
<!-- Atmospheric Background -->
<div class="fixed inset-0 z-0">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-aurora animate-pulse-slow"></div>
<div class="absolute inset-0 bg-[#0A0A0B]/80"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-md py-xl animate-in fade-in slide-in-from-bottom-4 duration-1000">
<!-- Header Section -->
<header class="text-center mb-xl space-y-sm">
<div class="flex justify-center mb-md">
<div class="w-12 h-12 rounded-xl bg-primary-container flex items-center justify-center shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-on-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">Welcome to Flux</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs mx-auto">The future of realtime communication.</p>
</header>
<!-- Auth Form -->
<div class="glass-panel rounded-xl p-lg shadow-2xl">
<form class="space-y-lg" id="auth-form" onsubmit="return false">
<!-- Email Field -->
<div class="space-y-xs group">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1 transition-colors group-focus-within:text-primary" for="email">Email Address</label>
<div class="relative input-glow border-b border-outline-variant/30 transition-all duration-300">
<input class="w-full bg-transparent border-none focus:ring-0 px-1 py-3 text-on-surface font-body-md placeholder:text-outline-variant/50" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs group">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1 transition-colors group-focus-within:text-primary" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative input-glow border-b border-outline-variant/30 transition-all duration-300">
<input class="w-full bg-transparent border-none focus:ring-0 px-1 py-3 text-on-surface font-body-md placeholder:text-outline-variant/50" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-md">
<button class="w-full custom-button-gradient text-on-primary font-headline-sm text-headline-sm py-4 rounded-lg shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-sm group" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Links -->
<footer class="mt-xl text-center space-y-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 transition-all" href="#">Create an account</a>
</p>
<div class="flex items-center justify-center gap-xs pt-md opacity-40 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[14px]">verified_user</span>
<span class="font-mono-sm text-mono-sm uppercase tracking-widest">End-to-End Encrypted</span>
</div>
</footer>
</div>
<!-- System Status Micro-indicator -->
<div class="mt-xl flex justify-center gap-lg">
<div class="flex items-center gap-sm">
<span class="w-2 h-2 rounded-full bg-tertiary shadow-[0_0_8px_rgba(74,225,118,0.5)]"></span>
<span class="font-mono-sm text-mono-sm text-on-surface-variant/60 uppercase">System Operational</span>
</div>
</div>
</main>
<!-- Interactive Elements Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                // Subtle interaction logic can go here
            });
        });

        const form = document.getElementById('auth-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 2000);
        });
    </script>
<!-- Decorative Corner Accents -->
<div class="fixed top-0 right-0 p-lg opacity-20 pointer-events-none">
<div class="w-32 h-px bg-gradient-to-l from-primary to-transparent"></div>
<div class="h-32 w-px bg-gradient-to-t from-primary to-transparent absolute top-lg right-lg"></div>
</div>
<div class="fixed bottom-0 left-0 p-lg opacity-20 pointer-events-none">
<div class="w-32 h-px bg-gradient-to-r from-primary to-transparent"></div>
<div class="h-32 w-px bg-gradient-to-b from-primary to-transparent absolute bottom-lg left-lg"></div>
</div>
</body></html>
